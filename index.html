<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-WARRIORS: EVOLUTION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap');
        
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-gold: #f2c94c;
        }

        body {
            background: #020205;
            color: #e0e0e0;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .font-game { font-family: 'Orbitron', sans-serif; }

        /* Glassmorphism */
        .glass {
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neon-border { box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); border: 1px solid var(--neon-blue); }

        /* Evolution Animation */
        .hero-glow {
            filter: drop-shadow(0 0 20px var(--glow-color));
            transition: all 0.5s ease;
        }

        .tap-particle {
            position: absolute;
            pointer-events: none;
            animation: particleUp 0.8s ease-out forwards;
            font-weight: bold;
            z-index: 100;
        }

        @keyframes particleUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Floating Nav */
        .nav-item { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0.5; }
        .nav-item.active { opacity: 1; transform: translateY(-8px) scale(1.1); color: var(--neon-blue); }
    </style>
</head>
<body class="h-screen flex flex-col">

<div id="app" class="h-full w-full relative">
    <div id="selection-screen" class="absolute inset-0 z-[100] bg-[#020205] p-6 flex flex-col justify-center animate__animated">
        <h1 class="font-game text-center text-3xl mb-2 tracking-widest text-white glow-text">X-WARRIORS</h1>
        <p class="text-center text-gray-500 text-sm mb-10">اختر سلالتك القتالية لبدء الغزو</p>
        
        <div class="space-y-4">
            <div onclick="initGame('cats')" class="glass p-4 rounded-3xl flex items-center gap-4 cursor-pointer hover:neon-border transition-all group">
                <div class="text-5xl group-hover:scale-110 transition-transform">🐱</div>
                <div>
                    <h3 class="font-bold text-blue-400 text-lg">سلالة الـ Cyber-Cats</h3>
                    <p class="text-[10px] text-gray-400">ميزة: تعدين تلقائي فائق (Passive Income x2)</p>
                </div>
            </div>
            <div onclick="initGame('dogs')" class="glass p-4 rounded-3xl flex items-center gap-4 cursor-pointer hover:neon-border transition-all group border-red-500/20">
                <div class="text-5xl group-hover:scale-110 transition-transform">🐶</div>
                <div>
                    <h3 class="font-bold text-red-400 text-lg">سلالة الـ War-Hounds</h3>
                    <p class="text-[10px] text-gray-400">ميزة: قوة ضرب مضاعفة (Tap Power x2)</p>
                </div>
            </div>
            <div onclick="initGame('aliens')" class="glass p-4 rounded-3xl flex items-center gap-4 cursor-pointer hover:neon-border transition-all group border-purple-500/20">
                <div class="text-5xl group-hover:scale-110 transition-transform">👽</div>
                <div>
                    <h3 class="font-bold text-purple-400 text-lg">سلالة الـ Zenith</h3>
                    <p class="text-[10px] text-gray-400">ميزة: مكافآت العشائر والمهام (Quests Bonus x2)</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-ui" class="hidden h-full flex flex-col">
        <header class="p-4 flex justify-between items-center glass border-b border-white/5 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div id="mini-hero" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-2xl neon-border">🐱</div>
                <div>
                    <p class="text-[10px] font-bold uppercase tracking-widest text-blue-400" id="rank-name">Recruit</p>
                    <div class="w-24 h-1.5 bg-gray-800 rounded-full mt-1 overflow-hidden">
                        <div id="xp-bar" class="h-full bg-blue-500 shadow-[0_0_10px_#00d2ff]" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Balance</p>
                <p class="text-2xl font-game font-bold text-white" id="balance">0</p>
            </div>
        </header>

        <main id="content" class="flex-grow overflow-y-auto p-4 pb-32 no-scrollbar">
            </main>

        <nav class="fixed bottom-0 left-0 right-0 h-24 glass rounded-t-[40px] border-t border-white/10 flex justify-around items-center px-4 z-[60]">
            <button onclick="router('home')" class="nav-item active flex flex-col items-center gap-1" id="nav-home">
                <span class="text-2xl">🏠</span><span class="text-[9px] font-bold uppercase">Warzone</span>
            </button>
            <button onclick="router('upgrade')" class="nav-item flex flex-col items-center gap-1" id="nav-upgrade">
                <span class="text-2xl">⚡</span><span class="text-[9px] font-bold uppercase">Upgrade</span>
            </button>
            <button onclick="router('clans')" class="nav-item flex flex-col items-center gap-1" id="nav-clans">
                <span class="text-2xl">🛡️</span><span class="text-[9px] font-bold uppercase">Clans</span>
            </button>
            <button onclick="router('tasks')" class="nav-item flex flex-col items-center gap-1" id="nav-tasks">
                <span class="text-2xl">📜</span><span class="text-[9px] font-bold uppercase">Tasks</span>
            </button>
            <button onclick="router('wallet')" class="nav-item flex flex-col items-center gap-1" id="nav-wallet">
                <span class="text-2xl">💰</span><span class="text-[9px] font-bold uppercase">Wallet</span>
            </button>
        </nav>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Game Database & Logic
    let db = {
        user: {
            balance: 0,
            xp: 0,
            level: 1,
            race: '',
            energy: 1000,
            maxEnergy: 1000,
            profitPerSec: 0,
            tapPower: 1
        },
        ranks: ["Recruit", "Warrior", "Knight", "Commander", "General", "Legend", "Mythic", "Eternal", "God-Mode", "X-Lord"]
    };

    const raceConfig = {
        cats: { emoji: ["🐱", "🙀", "🦁", "🐅", "🐆", "🐈‍⬛", "🐯", "🤖🐱", "☄️🐱", "👑🐱"], color: "#00d2ff" },
        dogs: { emoji: ["🐶", "🐺", "🐕", "🐩", "🐕‍🦺", "🦊", "👺", "🤖🐶", "🔥🐶", "👑🐶"], color: "#ff4d4d" },
        aliens: { emoji: ["👽", "👾", "👺", "👻", "🤖", "🛸", "☄️", "🌑", "🌌", "👑🛸"], color: "#9d50bb" }
    };

    function initGame(race) {
        db.user.race = race;
        if(race === 'dogs') db.user.tapPower = 2;
        if(race === 'cats') db.user.profitPerSec = 1;
        
        document.getElementById('selection-screen').classList.add('animate__fadeOut');
        setTimeout(() => {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('main-ui').classList.remove('hidden');
            router('home');
            startLoops();
        }, 500);
    }

    function router(page) {
        const content = document.getElementById('content');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`nav-${page}`).classList.add('active');
        
        // Dynamic Hero Image based on Level
        const heroEmoji = raceConfig[db.user.race].emoji[db.user.level - 1];
        document.getElementById('mini-hero').innerText = heroEmoji;

        if (page === 'home') {
            content.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[60vh] animate__animated animate__fadeIn">
                    <div class="relative w-72 h-72 flex items-center justify-center">
                        <div class="absolute inset-0 bg-blue-500/10 rounded-full blur-3xl animate-pulse"></div>
                        <div id="main-hero" class="text-[150px] hero-glow cursor-pointer select-none active:scale-90 transition-transform" 
                             style="--glow-color: ${raceConfig[db.user.race].color}">
                            ${heroEmoji}
                        </div>
                    </div>
                    
                    <div class="w-full max-w-xs mt-10">
                        <div class="flex justify-between text-[10px] font-bold mb-1">
                            <span>⚡ ENERGY</span>
                            <span id="energy-text">${db.user.energy}/1000</span>
                        </div>
                        <div class="w-full h-2.5 bg-gray-900 rounded-full border border-white/5 overflow-hidden">
                            <div id="energy-bar" class="h-full bg-gradient-to-r from-yellow-400 to-yellow-600 shadow-[0_0_10px_#f2c94c]" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('main-hero').addEventListener('touchstart', handleTap);
        } else if (page === 'upgrade') {
            content.innerHTML = `
                <h2 class="text-xl font-game font-bold mb-6 text-blue-400">UPGRADES</h2>
                <div class="space-y-3">
                    <div onclick="upgrade('tap')" class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-yellow-500">
                        <div><p class="font-bold">Multitap</p><p class="text-xs text-gray-500">Increase tap power</p></div>
                        <button class="bg-white/5 px-4 py-2 rounded-xl text-yellow-500 font-bold">500 🪙</button>
                    </div>
                    <div onclick="upgrade('profit')" class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-green-500">
                        <div><p class="font-bold">Mining Rig</p><p class="text-xs text-gray-500">Passive income +5/sec</p></div>
                        <button class="bg-white/5 px-4 py-2 rounded-xl text-green-500 font-bold">2000 🪙</button>
                    </div>
                </div>
            `;
        } else if (page === 'clans') {
            content.innerHTML = `
                <div class="text-center mt-10">
                    <div class="text-6xl mb-4">🛡️</div>
                    <h2 class="text-2xl font-bold mb-2">CLAN WARS</h2>
                    <p class="text-gray-500 text-sm mb-6">انضم لعشيرة ودافع عن سلالتك في الحرب الكبرى</p>
                    <div class="glass p-6 rounded-3xl border border-blue-500/20">
                        <p class="text-blue-400 font-bold mb-4 italic">لا توجد عشائر نشطة حالياً</p>
                        <button class="w-full bg-blue-600 py-3 rounded-2xl font-bold">إنشاء عشيرة (50k 🪙)</button>
                    </div>
                </div>
            `;
        } else if (page === 'tasks') {
            content.innerHTML = `
                <h2 class="text-xl font-game font-bold mb-6">QUESTS</h2>
                <div class="glass p-4 rounded-2xl flex justify-between items-center mb-3">
                    <div class="flex items-center gap-3"><span>📺</span><p class="text-sm font-bold">Watch Ad</p></div>
                    <button class="text-xs bg-blue-600 px-3 py-1 rounded-lg">+100</button>
                </div>
                <div class="glass p-4 rounded-2xl flex justify-between items-center">
                    <div class="flex items-center gap-3"><span>🐦</span><p class="text-sm font-bold">Follow X</p></div>
                    <button class="text-xs bg-blue-600 px-3 py-1 rounded-lg">+1000</button>
                </div>
            `;
        } else if (page === 'wallet') {
            content.innerHTML = `
                <div class="text-center mt-10">
                    <div class="text-6xl mb-4">💎</div>
                    <h2 class="text-2xl font-game font-bold">WALLET</h2>
                    <p class="text-gray-400 text-xs mb-8">ربط المحفظة لسحب أرباح الإيردروب</p>
                    <button onclick="tg.showAlert('قريباً: ربط محفظة TON')" class="w-full bg-white text-black font-bold py-4 rounded-3xl shadow-[0_0_20px_rgba(255,255,255,0.2)]">Connect Wallet</button>
                </div>
            `;
        }
    }

    function handleTap(e) {
        if (db.user.energy <= 0) {
            tg.HapticFeedback.notificationOccurred('error');
            return;
        }

        const touch = e.touches[0];
        db.user.balance += db.user.tapPower;
        db.user.xp += 1;
        db.user.energy -= 1;

        if (db.user.xp >= 100) levelUp();

        updateUI();
        createParticle(touch.clientX, touch.clientY);
        tg.HapticFeedback.impactOccurred('medium');
    }

    function levelUp() {
        if (db.user.level < 10) {
            db.user.level++;
            db.user.xp = 0;
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert(`Level Up! أنت الآن ${db.ranks[db.user.level-1]}. سلالتك تطورت كلياً!`);
            router('home');
        }
    }

    function createParticle(x, y) {
        const p = document.createElement('div');
        p.className = 'tap-particle font-game';
        p.innerText = `+${db.user.tapPower}`;
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        p.style.color = raceConfig[db.user.race].color;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(db.user.balance).toLocaleString();
        document.getElementById('xp-bar').style.width = db.user.xp + '%';
        document.getElementById('rank-name').innerText = db.ranks[db.user.level-1];
        
        const enBar = document.getElementById('energy-bar');
        const enText = document.getElementById('energy-text');
        if(enBar) {
            enBar.style.width = (db.user.energy / 1000) * 100 + '%';
            enText.innerText = `${db.user.energy}/1000`;
        }
    }

    function startLoops() {
        // Passive Income Loop
        setInterval(() => {
            db.user.balance += (db.user.profitPerSec / 10);
            if (db.user.energy < 1000) db.user.energy += 1;
            updateUI();
        }, 100);
    }
</script>
</body>
</html>
