<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-Warriors: The Awakening</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Cairo:wght@400;700&display=swap');
        
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-gold: #ffcf00;
        }

        body {
            background: #050505;
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .font-cyber { font-family: 'Syncopate', sans-serif; }

        .choice-card {
            background: linear-gradient(145deg, #111, #050505);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .choice-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            transform: translateY(-10px);
        }

        .character-img {
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

        .level-progress {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .stat-badge { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }

        /* Animations */
        .glow-text { text-shadow: 0 0 10px currentColor; }
        .tap-effect { position: absolute; pointer-events: none; animation: tapAnim 0.6s ease-out forwards; font-weight: bold; }
        @keyframes tapAnim { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.5); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="game-container" class="relative w-full h-full">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let user = {
            hasChosen: false,
            race: '',
            level: 1,
            balance: 0,
            energy: 1000,
            maxEnergy: 1000,
            xp: 0,
            maxXp: 100
        };

        const races = {
            dogs: {
                name: "فصيل الكلاب (War-Hounds)",
                desc: "مختصون في الهجوم. كل ضغطة تعطي قوة مضاعفة.",
                ability: "هجوم كاسح",
                color: "#ff4d4d",
                img: "https://cdn-icons-png.flaticon.com/512/616/616408.png" // مثال لصور مستوى 1
            },
            cats: {
                name: "فصيل القطط (Cyber-Cats)",
                desc: "ملوك التعدين. أرباح سلبية عالية جداً حتى وأنت نائم.",
                ability: "تعدين شبحي",
                color: "#00f3ff",
                img: "https://cdn-icons-png.flaticon.com/512/616/616430.png"
            },
            aliens: {
                name: "الكائنات العلوية (Zenith)",
                desc: "أسياد العشائر. بونوس ضخم عند دعوة الأصدقاء والحروب.",
                ability: "سيطرة ذهنية",
                color: "#bc13fe",
                img: "https://cdn-icons-png.flaticon.com/512/616/616421.png"
            }
        };

        function showOnboarding() {
            const container = document.getElementById('game-container');
            container.innerHTML = `
                <div class="p-6 h-full flex flex-col items-center justify-center animate__animated animate__fadeIn">
                    <h1 class="font-cyber text-2xl text-center mb-2 glow-text" style="color: #fff">X-WARRIORS</h1>
                    <p class="text-gray-500 text-sm mb-8">اختر فصيلك بعناية، لا يمكن التراجع</p>
                    
                    <div class="space-y-4 w-full">
                        ${Object.entries(races).map(([id, r]) => `
                            <div onclick="selectRace('${id}')" class="choice-card p-4 rounded-3xl flex items-center gap-4 cursor-pointer">
                                <img src="${r.img}" class="w-20 h-20 object-contain character-img">
                                <div>
                                    <h3 class="font-bold" style="color: ${r.color}">${r.name}</h3>
                                    <p class="text-[10px] text-gray-400">${r.desc}</p>
                                    <span class="text-[9px] bg-white/5 px-2 py-0.5 rounded mt-2 inline-block border border-white/10 italic">القدرة: ${r.ability}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function selectRace(raceId) {
            user.hasChosen = true;
            user.race = raceId;
            tg.HapticFeedback.notificationOccurred('success');
            showMainGame();
        }

        function showMainGame() {
            const race = races[user.race];
            const container = document.getElementById('game-container');
            container.innerHTML = `
                <div class="p-4 flex justify-between items-center bg-black/50 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
                    <div class="flex items-center gap-2">
                        <div class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 p-1">
                            <img src="${race.img}" class="w-full h-full object-contain">
                        </div>
                        <div>
                            <p class="text-[10px] font-bold" style="color: ${race.color}">LVL ${user.level} ${user.race.toUpperCase()}</p>
                            <div class="w-24 h-1.5 bg-gray-800 rounded-full mt-0.5">
                                <div class="level-progress h-full rounded-full" style="width: ${(user.xp/user.maxXp)*100}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Gold Reserves</p>
                        <p class="text-xl font-cyber text-white glow-text" id="balance-val">${user.balance.toLocaleString()}</p>
                    </div>
                </div>

                <div class="flex flex-col items-center justify-center h-[70%] relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-${user.race === 'cats' ? 'blue' : 'red'}-900/10 to-transparent pointer-events-none"></div>
                    
                    <div id="tap-zone" class="relative z-10 active:scale-95 transition-transform duration-75 cursor-pointer">
                        <img src="${race.img}" id="hero-img" class="w-64 h-64 object-contain character-img animate__animated animate__pulse animate__infinite animate__slow">
                    </div>

                    <div class="absolute bottom-10 w-full px-10">
                         <div class="flex justify-between text-[10px] mb-1 font-bold">
                            <span>⚡ ENERGY</span>
                            <span id="energy-val">${user.energy}/${user.maxEnergy}</span>
                         </div>
                         <div class="w-full h-3 bg-white/5 rounded-full overflow-hidden border border-white/10">
                            <div id="energy-fill" class="h-full bg-white transition-all" style="width: 100%"></div>
                         </div>
                    </div>
                </div>

                <nav class="fixed bottom-6 left-6 right-6 h-20 bg-white/5 backdrop-blur-2xl rounded-[35px] border border-white/10 flex justify-around items-center px-4 shadow-2xl">
                    <button class="flex flex-col items-center gap-1 text-white"><span class="text-xl">🏠</span><span class="text-[8px] font-bold">WARZONE</span></button>
                    <button class="flex flex-col items-center gap-1 text-gray-500"><span class="text-xl">⚔️</span><span class="text-[8px] font-bold">UPGRADE</span></button>
                    <button class="flex flex-col items-center gap-1 text-gray-500"><span class="text-xl">🛡️</span><span class="text-[8px] font-bold">CLANS</span></button>
                    <button class="flex flex-col items-center gap-1 text-gray-500"><span class="text-xl">📜</span><span class="text-[8px] font-bold">TASKS</span></button>
                </nav>
            `;

            document.getElementById('tap-zone').addEventListener('touchstart', (e) => handleTap(e));
        }

        function handleTap(e) {
            if (user.energy <= 0) return;
            
            const touch = e.touches[0];
            user.balance += (user.race === 'dogs' ? 2 : 1);
            user.xp += 1;
            user.energy -= 2;

            if(user.xp >= user.maxXp) levelUp();

            updateUI();
            spawnCoin(touch.clientX, touch.clientY);
            tg.HapticFeedback.impactOccurred('light');
        }

        function levelUp() {
            user.level++;
            user.xp = 0;
            user.maxXp *= 2;
            tg.showAlert(`تهانينا! ارتقيت للمستوى ${user.level}. شكلك أصبح أكثر هيبة وقوتك تضاعفت!`);
            // هنا تقدر تبدل user.img على حساب المستوى
        }

        function spawnCoin(x, y) {
            const el = document.createElement('div');
            el.className = 'tap-effect font-cyber text-lg';
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.color = races[user.race].color;
            el.innerText = `+${user.race === 'dogs' ? '2' : '1'}`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        function updateUI() {
            document.getElementById('balance-val').innerText = Math.floor(user.balance).toLocaleString();
            document.getElementById('energy-val').innerText = `${user.energy}/${user.maxEnergy}`;
            document.getElementById('energy-fill').style.width = `${(user.energy/user.maxEnergy)*100}%`;
        }

        // Energy Recovery
        setInterval(() => {
            if (user.energy < user.maxEnergy) {
                user.energy += 1;
                updateUI();
            }
        }, 1000);

        showOnboarding();
    </script>
</body>
</html>
