<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legion of Ether | Pro Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap');
        
        :root {
            --primary-gold: #fbbf24;
            --bg-dark: #050505;
            --card-bg: #111111;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .font-game { font-family: 'Orbitron', sans-serif; }

        .main-button-container {
            perspective: 1000px;
        }

        .warrior-shield {
            background: radial-gradient(circle, #222 0%, #000 100%);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.1);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #1a1a1a;
        }

        .warrior-shield:active {
            transform: scale(0.92) rotateX(10deg);
            border-color: var(--primary-gold);
        }

        .energy-bar-fill {
            transition: width 0.3s ease;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        .nav-active {
            color: var(--primary-gold) !important;
            filter: drop-shadow(0 0 8px var(--primary-gold));
        }

        .floating-text {
            position: absolute;
            pointer-events: none;
            color: var(--primary-gold);
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            animation: float-up 0.7s ease-out forwards;
            z-index: 100;
        }

        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }

        .glass-morphism {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col select-none">

    <div class="p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-2xl border border-white/10">
            <div class="w-8 h-8 bg-yellow-500 rounded-full flex items-center justify-center text-black font-bold shadow-lg">L</div>
            <div>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Level 1: Recruit</p>
                <div class="w-20 h-1 bg-gray-800 rounded-full mt-1">
                    <div class="bg-blue-500 h-full rounded-full" style="width: 30%"></div>
                </div>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Balance</p>
            <p class="text-2xl font-game font-bold text-yellow-500 gold-glow" id="balance">1,000</p>
        </div>
    </div>

    <main id="screen-content" class="flex-grow flex flex-col items-center justify-center relative overflow-y-auto px-4 pb-24">
        </main>

    <div class="fixed bottom-0 left-0 right-0 z-[100]">
        <div class="px-6 mb-2">
            <div class="flex justify-between text-[10px] font-bold mb-1 px-1">
                <span class="flex items-center gap-1">⚡ <span id="energy-text">1000/1000</span></span>
                <span class="text-gray-500 uppercase">Energy</span>
            </div>
            <div class="w-full h-2 bg-gray-900 rounded-full overflow-hidden border border-white/5">
                <div id="energy-bar" class="energy-bar-fill h-full w-full"></div>
            </div>
        </div>

        <nav class="glass-morphism h-20 flex justify-around items-center px-4 rounded-t-3xl">
            <button onclick="router('home')" class="flex flex-col items-center gap-1 transition-all" id="nav-home">
                <span class="text-xl">🏠</span><span class="text-[9px] font-bold uppercase">Home</span>
            </button>
            <button onclick="router('fighters')" class="flex flex-col items-center gap-1 text-gray-500" id="nav-fighters">
                <span class="text-xl">⚔️</span><span class="text-[9px] font-bold uppercase">Fighters</span>
            </button>
            <button onclick="router('clans')" class="flex flex-col items-center gap-1 text-gray-500" id="nav-clans">
                <span class="text-xl">🛡️</span><span class="text-[9px] font-bold uppercase">Clans</span>
            </button>
            <button onclick="router('tasks')" class="flex flex-col items-center gap-1 text-gray-500" id="nav-tasks">
                <span class="text-xl">📜</span><span class="text-[9px] font-bold uppercase">Tasks</span>
            </button>
            <button onclick="router('wallet')" class="flex flex-col items-center gap-1 text-gray-500" id="nav-wallet">
                <span class="text-xl">💎</span><span class="text-[9px] font-bold uppercase">Wallet</span>
            </button>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation();

        // Game State
        let game = {
            balance: 1000.0,
            energy: 1000,
            maxEnergy: 1000,
            tapValue: 1,
            passiveIncome: 0.0,
            currentScreen: 'home'
        };

        const warriors = [
            { id: 1, name: "Neon Shadow", price: 500, income: 0.5, icon: "👤" },
            { id: 2, name: "Cyber Knight", price: 5000, income: 5, icon: "🤖" },
            { id: 3, name: "Ether Drake", price: 50000, income: 60, icon: "🐲" }
        ];

        function router(screen) {
            game.currentScreen = screen;
            const content = document.getElementById('screen-content');
            
            // Update Nav UI
            document.querySelectorAll('nav button').forEach(b => b.classList.add('text-gray-500'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(`nav-${screen}`).classList.add('nav-active');
            document.getElementById(`nav-${screen}`).classList.remove('text-gray-500');

            if (screen === 'home') {
                content.innerHTML = `
                    <div class="animate__animated animate__zoomIn text-center flex flex-col items-center">
                        <div class="mb-4 glass-morphism px-6 py-2 rounded-full border border-yellow-500/20">
                            <p class="text-xs text-yellow-500 font-bold uppercase tracking-widest">Profit per hour: <span class="text-white">+${(game.passiveIncome * 3600).toFixed(0)}</span></p>
                        </div>
                        <div class="main-button-container relative mt-10">
                            <div id="clicker" class="warrior-shield w-64 h-64 rounded-full flex items-center justify-center cursor-pointer relative overflow-hidden">
                                <span class="text-[140px] drop-shadow-[0_0_20px_rgba(255,255,255,0.2)]">⚔️</span>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('clicker').addEventListener('touchstart', handleTap);
            } else if (screen === 'fighters') {
                content.innerHTML = `
                    <div class="w-full animate__animated animate__fadeInUp mt-4">
                        <h2 class="text-xl font-bold mb-6 flex items-center gap-2 font-game">UPGRADE ARMY</h2>
                        <div class="grid gap-3">
                            ${warriors.map(w => `
                                <div onclick="buyUpgrade(${w.id})" class="bg-[#111] p-4 rounded-3xl border border-white/5 flex justify-between items-center active:scale-95 transition-all">
                                    <div class="flex items-center gap-4">
                                        <div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-3xl border border-white/10">${w.icon}</div>
                                        <div>
                                            <p class="font-bold text-sm">${w.name}</p>
                                            <p class="text-[10px] text-green-500 font-bold uppercase tracking-tighter">Profit +${w.income}/sec</p>
                                        </div>
                                    </div>
                                    <div class="bg-white/5 px-4 py-2 rounded-2xl border border-white/10">
                                        <p class="text-xs font-game text-yellow-500 font-bold">${w.price.toLocaleString()}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (screen === 'tasks') {
                content.innerHTML = `
                    <div class="w-full animate__animated animate__fadeIn">
                        <h2 class="text-xl font-bold mb-6 font-game">QUESTS</h2>
                        <div class="bg-[#111] p-6 rounded-3xl border border-yellow-500/20 text-center mb-4">
                            <p class="text-sm mb-4 text-gray-400">Join our channel to unlock rewards!</p>
                            <button onclick="tg.openTelegramLink('https://t.me/YOUR_LINK')" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-2xl active:scale-95 transition-all">JOIN CHANNEL</button>
                        </div>
                    </div>
                `;
            } else {
                content.innerHTML = `<div class="mt-20 text-gray-600 font-game uppercase tracking-widest animate-pulse">Coming Soon</div>`;
            }
        }

        function handleTap(e) {
            if (game.energy <= 0) {
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            const touch = e.touches[0];
            game.balance += game.tapValue;
            game.energy -= 1;
            
            updateUI();
            createFloatingText(touch.clientX, touch.clientY);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function createFloatingText(x, y) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = `+${game.tapValue}`;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        function buyUpgrade(id) {
            const w = warriors.find(x => x.id === id);
            if (game.balance >= w.price) {
                game.balance -= w.price;
                game.passiveIncome += w.income;
                tg.HapticFeedback.notificationOccurred('success');
                router('fighters');
                updateUI();
            } else {
                tg.showAlert("Not enough gold, Warrior!");
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(game.balance).toLocaleString();
            document.getElementById('energy-text').innerText = `${game.energy}/${game.maxEnergy}`;
            document.getElementById('energy-bar').style.width = `${(game.energy / game.maxEnergy) * 100}%`;
        }

        // Loops
        setInterval(() => {
            // Passive Income
            game.balance += (game.passiveIncome / 10);
            
            // Energy Regen
            if (game.energy < game.maxEnergy) {
                game.energy += 1;
            }
            updateUI();
        }, 100);

        // Init
        router('home');
    </script>
</body>
</html>
